<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Walking With You In Denim | Ununifying Minds</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/playlist.css" />
</head>

<body>
  <main class="playlist-page denim-theme">
    <img class="playlist-bg" src="./img/curation/denim/bg2.jpg" alt="" />

    <section class="playlist-visual">
      <div class="big-vinyl">
        <img class="big-title" src="./img/curation/denim/title.svg" alt="Walking With You In Denim" />
        <img class="big-cover" src="./img/curation/denim/cover.jpg" alt="" />
        <span class="big-play">▷</span>
      </div>
<img class="playlist-texts" src="./img/curation/chrome/texts.png" alt="" />   
      <div class="orbit-track-list denim-list">
        <button class="track t1 blue" data-song="iwilldare">I Will Dare</button>
        <button class="track t2 cyan" data-song="timeaftertime">Time After Time</button>
        <button class="track t3 red" data-song="idiot">Idiot In The Park</button>
        <button class="track t4 orange" data-song="icantwait">I Can’t Wait</button>
        <button class="track t5 black" data-song="binz">Sun Down Wind Chimes</button>
        <button class="track t6 green" data-song="startofaromance">Start Of A Romance</button>
        <button class="track t7 pink" data-song="jody">Jody</button>
      </div>
    </section>

    <div class="detail-overlay">
      <div class="aura-third"></div>
    </div>

    <aside class="detail-panel" aria-hidden="true">
      <div class="detail-marquee">
        <button class="play-button" type="button">▶</button>

        <div class="marquee-track">
          <span>START START START START START START START START START&nbsp;&nbsp;</span>
          <span>START START START START START START START START START&nbsp;&nbsp;</span>
        </div>

        <audio id="detail-audio"></audio>
      </div>

      <div class="detail-main">
        <img class="detail-cover" src="" alt="" />

        <div class="detail-info">
          <h2></h2>
          <p></p>
        </div>

        <a class="detail-arrow" href="#" target="_blank">→</a>
      </div>

      <div class="detail-tags"></div>
      <div class="detail-text"></div>
    </aside>
  </main>

  <script src="./js/playlist.js"></script>
</body>
</html>
