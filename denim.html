<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Walking With You In Denim | Ununifying Minds</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/playlist.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alien+Block&family=Anonymous+Pro:ital,wght@0,400;0,700;1,400;1,700&family=Arbutus&family=Asta+Sans:wght@300..800&family=Bitcount+Single:wght@100..900&family=Bytesized&family=Chokokutai&family=Climate+Crisis:YEAR@1979&family=Cutive+Mono&family=Foldit:wght@100..900&family=Hedvig+Letters+Serif:opsz@12..24&family=Jacquarda+Bastarda+9&family=Michroma&family=Monoton&family=Noto+Sans+JP:wght@100..900&family=Noto+Sans+KR:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Serif+JP:wght@200..900&family=Orbit&family=Shippori+Mincho&family=Smokum&family=Special+Elite&family=Syne:wght@400..800&family=Yuji+Boku&display=swap" rel="stylesheet">
</head>

<body>
  <main class="playlist-page denim-theme">
    <img class="playlist-bg" src="./img/curation/denim/bg2.jpg" alt="" />

    <section class="playlist-visual">
      <div class="big-vinyl">
        <img class="big-title" src="./img/curation/denim/title.svg" alt="Walking With You In Denim" />
        <img class="big-cover" src="./img/curation/denim/cover.jpg" alt="" />
        <span class="big-play">▷</span>
      </div>
      <div class="orbit-track-list denim-list">
        <button class="track t1 blue" data-song="iwilldare">I Will Dare</button>
        <button class="track t3 red" data-song="idiot">Idiot In The Park</button>
        <button class="track t5 black" data-song="binz">Sun Down Wind Chimes</button>
        <button class="track t6 red" data-song="fame">
        Fame</button>  
        <button class="track t7 red" data-song="youngamericans">Young Americans</button>
        <button class="track t8 blue" data-song="letsdance">Let's Dance</button>
        <button class="track t9 cyan" data-song="nobodyelse">Nobody Else</button>
        <button class="track t10 pink" data-song="thewayshedances">The Way She Dances</button>
        <button class="track t11 purple" data-song="stay">Stay</button>
        <button class="track t12 cyan" data-song="morningflight">Morning Flight</button>
        <button class="track t13 blue" data-song="diamondhead">Diamond Head</button>
        <button class="track t14 black" data-song="whycantistop">Why Can't I Stop</button>
        <button class="track t15 pink" data-song="letsstaytogether">Let's Stay Together</button>
        <button class="track t16 teal" data-song="unknowingly">Unknowingly</button>
        <button class="track t17 brown" data-song="rockman">Rockman</button>
        <button class="track t18 blue" data-song="aiaigasa">Ai Ai Gasa</button>
        
      </div>
    </section>

    <div class="detail-overlay">
      <div class="aura-third"></div>
    </div>

    <aside class="detail-panel" aria-hidden="true">
      <div class="detail-marquee">
        <button class="play-button" type="button">▶</button>

        <div class="marquee-track">
          <span>START START START START START START START START START&nbsp;&nbsp;</span>
          <span>START START START START START START START START START&nbsp;&nbsp;</span>
        </div>

        <audio id="detail-audio"></audio>
      </div>

      <div class="detail-main">
        <img class="detail-cover" src="" alt="" />

        <div class="detail-info">
          <h2></h2>
          <p></p>
        </div>

        <a class="detail-arrow" href="#" target="_blank">→</a>
      </div>

      <div class="detail-tags"></div>
      <div class="detail-text"></div>
    </aside>
  </main>

  <script src="./js/playlist.js"></script>
</body>
</html>
