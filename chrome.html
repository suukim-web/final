<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Chrome Pop Telly | Ununifying Minds</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/playlist.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alien+Block&family=Anonymous+Pro:ital,wght@0,400;0,700;1,400;1,700&family=Arbutus&family=Asta+Sans:wght@300..800&family=Bitcount+Single:wght@100..900&family=Bytesized&family=Chokokutai&family=Climate+Crisis:YEAR@1979&family=Cutive+Mono&family=Foldit:wght@100..900&family=Hedvig+Letters+Serif:opsz@12..24&family=Jacquarda+Bastarda+9&family=Michroma&family=Monoton&family=Noto+Sans+JP:wght@100..900&family=Noto+Sans+KR:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Serif+JP:wght@200..900&family=Orbit&family=Shippori+Mincho&family=Smokum&family=Special+Elite&family=Syne:wght@400..800&family=Yuji+Boku&display=swap" rel="stylesheet">
</head>

<body>
  <main class="playlist-page chrome-theme">
    <img class="playlist-bg" src="./img/curation/chrome/bg2.jpg" alt="" />

    <section class="playlist-visual">
      <div class="big-vinyl">
        <img class="big-title" src="./img/curation/chrome/title.svg" alt="Chrome Pop Telly" />
        <img class="big-cover" src="./img/curation/chrome/cover.jpg" alt="" />
        <span class="big-play">▷</span>
      </div>
   <div class="orbit-track-list chrome-list">
        <button class="track t1 gray" data-song="getaway">Getaway</button>
        <button class="track t2 black" data-song="feelthereal">Feel The Real</button>
        <button class="track t3 cyan" data-song="theremust">There Must Be an Angel</button>
        <button class="track t4 black" data-song="oblivion">Oblivion</button>
        <button class="track t5 black" data-song="blackcat">Black Cat</button>
        <button class="track t6 purple" data-song="reality">REALiTi</button>
        <button class="track t7 olive" data-song="shower">Shower</button>
        <button class="track t8 purple" data-song="dekinai">I Can't Do It</button>
        <button class="track t9 black" data-song="patterns">Patterns</button>
        <button class="track t10 black" data-song="images">Images</button>
        <button class="track t11 cyan" data-song="ef">
        EF</button>
        <button class="track t12" data-song="urbanclearway">Urban Clearway</button>
        <button class="track t13 black" data-song="winternow">Winter Now</button>
        <button class="track t14 black" data-song="newyorkgrief">New York Grief</button>
        <button class="track t15 black" data-song="chokeenough">Choke Enough</button>
        <button class="track t16 olive" data-song="spring">Spring</button>
        <button class="track t17 black" data-song="unifying thought">Unifying Thought</button>
        <button class="track t18 teal" data-song="songforthemessanger">Song For The Messanger</button>
      </div>
    </section>

    <div class="detail-overlay">
      <div class="aura-third"></div>
    </div>

    <aside class="detail-panel" aria-hidden="true">
      <div class="detail-marquee">
        <button class="play-button" type="button">▶</button>

        <div class="marquee-track">
          <span>START START START START START START START START START&nbsp;&nbsp;</span>
          <span>START START START START START START START START START&nbsp;&nbsp;</span>
        </div>

        <audio id="detail-audio"></audio>
      </div>

      <div class="detail-main">
        <img class="detail-cover" src="" alt="" />

        <div class="detail-info">
          <h2></h2>
          <p></p>
        </div>

        <a class="detail-arrow" href="#" target="_blank">→</a>
      </div>

      <div class="detail-tags"></div>
      <div class="detail-text"></div>
    </aside>
  </main>

  <script src="./js/playlist.js"></script>
</body>
</html>
