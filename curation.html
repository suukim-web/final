<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Curation | Ununifying Minds</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/curation.css" />
</head>

<body>
  <main class="curation-page">

    <button class="slide-arrow prev-arrow" type="button">←</button>
    <button class="slide-arrow next-arrow" type="button">→</button>

    <section class="playlist-slider">

  <article class="playlist-slide">
    <img class="slide-bg" src="./img/curation/purple/bg2.jpg" alt="" />

    <a class="vinyl-link" href="purple.html" target="_blank">
      <div class="vinyl-rotator">
        <img class="vinyl-title purple-title"
     src="./img/curation/purple/title.svg">
        <img class="vinyl-cover" src="./img/curation/purple/cover.jpg" alt="" />
      </div>

      <svg class="vinyl-play" viewBox="0 0 100 100" aria-hidden="true">
        <polygon
          points="32,22 78,50 32,78"
          fill="none"
          stroke="white"
          stroke-width="1.4"
        />
      </svg>
    </a>
  </article>

  <article class="playlist-slide">
    <img class="slide-bg" src="./img/curation/chrome/bg.jpg" alt="" />

    <a class="vinyl-link" href="chrome.html" target="_blank">
      <div class="vinyl-rotator">
        <img class="vinyl-title chrome-title"
     src="./img/curation/chrome/title.svg">
        <img class="vinyl-cover" src="./img/curation/chrome/cover.jpg" alt="" />
      </div>

      <svg class="vinyl-play" viewBox="0 0 100 100" aria-hidden="true">
        <polygon
          points="32,22 78,50 32,78"
          fill="none"
          stroke="white"
          stroke-width="1.4"
        />
      </svg>
    </a>
  </article>

  <article class="playlist-slide is-active">
    <img class="slide-bg" src="./img/curation/denim/bg.jpg" alt="" />

    <a class="vinyl-link" href="denim.html" target="_blank">
      <div class="vinyl-rotator">
        <img class="vinyl-title denim-title"
     src="./img/curation/denim/title.svg">
        <img class="vinyl-cover" src="./img/curation/denim/cover.jpg" alt="" />
      </div>

      <svg class="vinyl-play" viewBox="0 0 100 100" aria-hidden="true">
        <polygon
          points="32,22 78,50 32,78"
          fill="none"
          stroke="white"
          stroke-width="1.4"
        />
      </svg>
    </a>
  </article>

</section>
  </main>

  <script src="./js/curation.js"></script>
</body>
</html>
